name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: hewg-ts
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            script: build:linux
            artifact: hewg
          - os: macos-latest
            target: darwin-arm64
            script: build:darwin-arm64
            artifact: hewg-darwin-arm64
          - os: macos-13
            target: darwin-x64
            script: build:darwin-x64
            artifact: hewg-darwin-x64
    defaults:
      run:
        working-directory: hewg-ts
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run ${{ matrix.script }}
      - run: ./dist/${{ matrix.artifact }} version
      - uses: actions/upload-artifact@v4
        with:
          name: hewg-${{ matrix.target }}
          path: hewg-ts/dist/${{ matrix.artifact }}
